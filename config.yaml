phases:
  early:
    lambda: 50
    mean_burst: 10
    mix: {cpu: 40, io: 30, mixed: 30}
    target_util: 65
    train_eps: 2000
    test_eps: 4000

  mid:
    lambda: 75
    mean_burst: 20
    mix: {cpu: 35, io: 35, mixed: 30}
    target_util: 70
    train_eps: 4000
    test_eps: 6000

  final:
    lambda: 100
    mean_burst: 25
    mix: {cpu: 30, io: 40, mixed: 30}
    target_util: 80
    train_eps: 6000
    test_eps: 10000

reward_sets:
