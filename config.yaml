    alpha: 1.0
    beta: 0.7
    delta: 0.7
    eta: 0.3

  S1:
    alpha: 1.5
    beta: 0.5
    delta: 0.5
    eta: 0.2

  S2:
    alpha: 0.7
    beta: 1.2
    delta: 0.5
    eta: 0.3

  S3:
    alpha: 1.0
    beta: 1.0
    delta: 1.0
    eta: 0.5

action_space:
  - scale_up
  - scale_down
  - migrate
  - noop

seeds_default:
  - 0
  - 1
  - 2
  - 3
  - 4
